services:

  bank-platform:

    build: .

    ports:

      - "8000:8000"

    depends_on:

      - postgres

      - redis

  postgres:

    image: postgres:16

    environment:

      POSTGRES_DB: bankdb

      POSTGRES_USER: bankuser

      POSTGRES_PASSWORD: bankpassword

    ports:

      - "5432:5432"

  redis:

    image: redis:7

    ports:

      - "6379:6379"