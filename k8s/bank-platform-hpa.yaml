apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: bank-platform

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: bank-platform

  minReplicas: 2

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 50